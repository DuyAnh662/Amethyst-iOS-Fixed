name: Build iOS JDK 25

# Manually triggered (or via push to a special path) — OpenJDK builds take
# 40-90 min on macos-14, so this is opt-in not auto.
#
# Strategy: lean on AngelAuraMC/angelauramc-openjdk-build's existing iOS
# build infrastructure (judge/buildjre17-21-25 branch). They have iOS
# patches for JDK 21 and Android patches for JDK 25 but no iOS-25 yet.
# We use the JDK 21 iOS patches as a starting point against JDK 25 source —
# expect some hunks to fail and require manual fixup as we iterate.

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/build-ios-jdk25.yml'
      - 'scripts/jdk25_ios_patches/**'

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 180
    steps:
      - name: Checkout amethyst (for any local patches)
        uses: actions/checkout@v4
        with:
          path: amethyst

      - name: Checkout AngelAuraMC openjdk-build
        uses: actions/checkout@v4
        with:
          repository: AngelAuraMC/angelauramc-openjdk-build
          ref: judge/buildjre17-21-25
          path: openjdk-build

      - name: Setup boot JDK (Zulu 24)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '24'

      - name: Install build deps
        run: |
          brew update
          brew install autoconf fontconfig ldid xquartz make wget
          xcode-select -p
          xcrun --sdk iphoneos --show-sdk-path
          xcrun --sdk iphoneos --show-sdk-version

      - name: Stage iOS-21 base patch into iOS-25 slot (skip mirror_mapping)
        working-directory: openjdk-build
        run: |
          mkdir -p patches/jre_25/ios
          # Phase 1: only the base iOS patch. Skip 2_mirror_mapping.diff (JIT
          # support) — most of its hunks are in HotSpot share/code which moved
          # heavily between JDK 21 and 25. JVM will run interpreted (-Xint
          # slow) but functional. Mirror mapping comes back as a separate
          # phase once the base build is green.
          cp patches/jre_21/ios/1_jdk21u_ios.diff patches/jre_25/ios/
          # Allow our own override / extension patches
          if [ -d ../amethyst/scripts/jdk25_ios_patches ]; then
            cp ../amethyst/scripts/jdk25_ios_patches/*.diff patches/jre_25/ios/ 2>/dev/null || true
          fi
          ls -la patches/jre_25/ios/

      - name: Make scripts executable
        working-directory: openjdk-build
        run: |
          chmod +x ios-arm64-clang ios-arm64-clang++ macos-host-cc
          chmod +x *.sh

      - name: Pre-scan JDK 25 source for known-bad iOS patterns
        run: |
          # Static analysis catches iOS-incompatible includes / API calls
          # before we burn 13 min compiling. Clone to /tmp so the actual
          # build's 5_clonejdk.sh can do its own clone undisturbed.
          SCAN_DIR=/tmp/jdk25-scan
          rm -rf "$SCAN_DIR"
          git clone --depth 1 --branch jdk-25.0.1+8 https://github.com/openjdk/jdk25u "$SCAN_DIR" 2>&1 | tail -3
          cd "$SCAN_DIR"
          echo "=== files including <mach/mach_vm.h> ==="
          grep -rn '#include\s*<mach/mach_vm.h>' src 2>/dev/null || echo "(none)"
          echo ""
          echo "=== files including <sys/proc_info.h> ==="
          grep -rn '#include\s*<sys/proc_info.h>' src 2>/dev/null || echo "(none)"
          echo ""
          echo "=== mach_vm_* / mach_port_t / host_priv_t call sites ==="
          grep -rln 'mach_vm_allocate\|mach_vm_deallocate\|mach_vm_protect\|mach_vm_region' src 2>/dev/null | head -20 || echo "(none)"
          echo ""
          echo "=== macOS-only frameworks referenced ==="
          grep -rln 'AppKit\.h\|Cocoa\.h\|Carbon\.h' src 2>/dev/null | head -10 || echo "(none)"
          echo ""
          echo "=== files w/ __APPLE__ but no TARGET_OS_IPHONE in BSD paths ==="
          for f in $(grep -rln '__APPLE__' src 2>/dev/null); do
            if ! grep -q 'TARGET_OS_IPHONE\|TARGET_OS_OSX' "$f" 2>/dev/null; then
              case "$f" in
                src/hotspot/os/bsd/*|*macosx*|*_bsd*) echo "  $f" ;;
              esac
            fi
          done | head -20

      - name: Patch OpenJDK build script (tolerate rejects + run our fixups)
        working-directory: openjdk-build
        run: |
          python3 << 'PYEOF'
          with open('6_buildjdk.sh','r') as f: s = f.read()

          # 1. Make git apply tolerant: it returns non-zero on any reject (which
          #    is normal with --reject), and the original `|| exit 1` aborts the
          #    whole build before our fixup script can run. Replace with `|| true`.
          old_apply = 'git apply --reject --whitespace=fix {} || (echo "git apply failed (iOs patch set)" && exit 1)'
          new_apply = 'git apply --reject --whitespace=fix {} || echo "git apply had rejects (expected, fixup script will handle)"'
          assert old_apply in s, "could not find git apply line to patch"
          s = s.replace(old_apply, new_apply)

          # 2. Inject our fixup script call AFTER the git-apply step and AFTER
          #    the macOS-desktop hack that mv's macosx out of the way. The
          #    fixup runs only for iOS+JDK25 builds.
          inject = '''
          # iOS JDK 25 fixups: targeted text replacements for hunks the JDK 21
          # base patch could not place because OpenJDK source moved between
          # versions. Bails out non-zero on a missing pattern (see WARN).
          if [[ "$BUILD_IOS" == "1" ]] && [[ "$TARGET_VERSION" == "25" ]]; then
            echo "[fixups] running jdk25_ios_fixups.py..."
            # 6_buildjdk.sh has cd'd into openjdk-25/ (i.e. openjdk-build/openjdk-25/),
            # so amethyst checkout is two levels up.
            python3 ../../amethyst/scripts/jdk25_ios_fixups.py .
          fi

          '''
          marker = '# rm -rf build'
          assert marker in s, "could not find injection point"
          s = s.replace(marker, inject + marker)

          # 3. Use `make -k` (keep going) so a single failure doesn't stop
          #    the whole build — we surface ALL iOS-incompatible spots in one
          #    run instead of iterating one-error-at-a-time.
          old_make = 'make JOBS=$jobs images || \\'
          new_make = 'make JOBS=$jobs -k images || \\'
          if old_make in s:
              s = s.replace(old_make, new_make)
              print("OK: enabled make -k (keep going on errors)")

          with open('6_buildjdk.sh','w') as f: f.write(s)
          print("OK: patched 6_buildjdk.sh")
          PYEOF
          grep -n "jdk25_ios_fixups\|git apply had rejects" 6_buildjdk.sh

      - name: Build iOS JDK 25
        working-directory: openjdk-build
        env:
          BUILD_IOS: '1'
          TARGET_VERSION: '25'
          NDK_VERSION: r27c
        shell: bash
        run: |
          set -o pipefail
          export TARGET=aarch64-apple-ios
          export TARGET_JDK=aarch64
          # tee swallowed the exit code last time; pipefail propagates it
          bash 2_ci_build_global.sh 2>&1 | tee build.log

      - name: Show last 200 lines of build log
        if: always()
        working-directory: openjdk-build
        run: tail -200 build.log 2>/dev/null || true

      - name: Summarize rejected patches
        if: always()
        working-directory: openjdk-build
        run: |
          REJ_COUNT=$(find openjdk-25 -name "*.rej" 2>/dev/null | wc -l | tr -d ' ')
          echo "=== rejected hunks: $REJ_COUNT files ==="
          find openjdk-25 -name "*.rej" 2>/dev/null | sort | head -50 | while read f; do
            HUNK_COUNT=$(grep -c '^@@' "$f")
            echo "  $f ($HUNK_COUNT hunks)"
          done

      - name: Find built JRE
        if: always()
        working-directory: openjdk-build
        run: |
          find . -name "libjvm.dylib" -type f 2>/dev/null | head -5
          find . -name "*.tar.xz" -type f 2>/dev/null | head -5

      - name: Upload built JRE if successful
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: jre25-ios-aarch64
          path: openjdk-build/**/*.tar.xz
          if-no-files-found: warn

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: openjdk-build/build.log
          if-no-files-found: ignore

      - name: Upload rejected patches (always, for analysis)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rejected-patches
          path: openjdk-build/openjdk-25/**/*.rej
          if-no-files-found: ignore

      - name: Upload patched-but-unbuilt JDK 25 source tree (rejects + applied)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: jdk25-patched-tree
          path: |
            openjdk-build/openjdk-25/src/hotspot/share/code/**
            openjdk-build/openjdk-25/src/hotspot/share/runtime/atomic.hpp
            openjdk-build/openjdk-25/src/hotspot/share/runtime/deoptimization.cpp
            openjdk-build/openjdk-25/src/hotspot/share/memory/heap.hpp
          if-no-files-found: ignore
