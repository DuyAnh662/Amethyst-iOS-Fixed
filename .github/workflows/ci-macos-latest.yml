name: Build (macos-latest)

on:
  push:
    branches: ['**']
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup JDK 8 (Zulu)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '8'

      - name: Install brew dependencies
        run: |
          brew update
          brew install make wget ldid

      - name: Cache iOS JREs
        id: cache-jres
        uses: actions/cache@v4
        with:
          path: depends/
          key: amethyst-jres-v1

      - name: Resolve env (paths, SDK)
        run: |
          echo "BOOTJDK=$JAVA_HOME/bin" >> $GITHUB_ENV
          echo "SDKPATH=$(xcrun --sdk iphoneos --show-sdk-path)" >> $GITHUB_ENV
          echo "RUNNER=0" >> $GITHUB_ENV
          echo "SLIMMED=1" >> $GITHUB_ENV

      - name: Verify tools
        run: |
          gmake --version | head -1
          ldid -V 2>&1 | head -1 || true
          cmake --version | head -1
          wget --version | head -1
          $BOOTJDK/javac -version
          xcrun --sdk iphoneos --show-sdk-version
          echo "SDKPATH=$SDKPATH"

      - name: Build sideload IPA (SideStore / personal cert)
        run: gmake -j$(sysctl -n hw.ncpu) dsym package PLATFORM=2

      - name: Build TrollStore tIPA
        run: gmake -j$(sysctl -n hw.ncpu) package PLATFORM=2 TROLLSTORE_JIT_ENT=1

      - name: List artifacts
        if: always()
        run: ls -la artifacts/ || true

      - name: Upload TrollStore tIPA
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Amethyst-trollstore-tipa
          path: artifacts/*-trollstore.tipa
          retention-days: 30
          if-no-files-found: warn

      - name: Upload regular IPA
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Amethyst-ipa
          path: artifacts/*.ipa
          retention-days: 30
          if-no-files-found: warn

      - name: Upload dSYM
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Amethyst-dSYM
          path: artifacts/AngelAuraAmethyst.dSYM
          retention-days: 14
          if-no-files-found: warn

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            Natives/build/CMakeFiles/CMakeOutput.log
            Natives/build/CMakeFiles/CMakeError.log
          if-no-files-found: ignore
