name: Development build

on:
  pull_request:
    branches-ignore:
      - 'l10n_main'
    types: [opened, reopened]
  push:
    branches-ignore:
      - 'l10n_main'

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          brew update
          brew install \
            cmake \
            ninja \
            pkg-config \
            autoconf \
            automake \
            libtool

      - name: Install JDK 8
        run: |
          brew install --cask temurin@8

      - name: Set Java 8 environment
        run: |
          echo "JAVA_HOME=$(/usr/libexec/java_home -v 1.8)" >> $GITHUB_ENV
          echo "$(/usr/libexec/java_home -v 1.8)/bin" >> $GITHUB_PATH

      - name: Verify Java
        run: |
          java -version
          echo $JAVA_HOME

      - name: Build
        run: |
          make

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Amethyst-build
          path: |
            build/**
            *.ipa
            *.xcarchive
