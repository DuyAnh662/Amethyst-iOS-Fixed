name: Development build

on:
  pull_request:
    types: [opened, reopened]
    branches: ['Amethyst-iOS-J25Exp']
  push:
    branches: ['Amethyst-iOS-J25Exp']
  workflow_dispatch:

jobs:
  build:
    name: Development build
    runs-on: macos-14
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Xcode Version
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      # provision the stable zulu jdk 8 runtime environment as structured in the upstream core
      - name: Setup JDK 8 (Zulu)
        uses: actions/setup-java@v4
        id: setup-java
        with:
          distribution: 'zulu'
          java-version: '8'

      # initialize essential building and packaging utilities via homebrew infrastructure
      - name: Install brew dependencies
        run: |
          brew update
          brew install make wget ldid
          sudo mkdir -p /usr/local/bin
          # map the gmake binary symlink seamlessly across the target build runner paths
          sudo ln -sf /opt/homebrew/bin/gmake /usr/local/bin/gmake

      - name: Cache iOS JREs
        id: cache-jres
        uses: actions/cache@v4
        with:
          path: depends/
          key: amethyst-jres-v1

      # resolve and inject core environmental paths and flags directly into the global execution scope
      - name: Resolve env (paths, SDK)
        run: |
          echo "SDKPATH=$(xcrun --sdk iphoneos --show-sdk-path)" >> $GITHUB_ENV
          echo "RUNNER=0" >> $GITHUB_ENV

      - name: Verify tools
        run: |
          gmake --version | head -1
          ldid -V 2>&1 | head -1 || true
          cmake --version | head -1
          wget --version | head -1
          xcrun --sdk iphoneos --show-sdk-version
          echo "SDKPATH=$SDKPATH"

      # Trigger gmake compilation pipelines with inline stderr filtering and execute post-build binary optimization
      - name: Build sideload IPA & TrollStore tIPA
        shell: bash
        run: |
          echo '#import <mach/mach.h>' | cat - Natives/JavaLauncher.m > temp && mv temp Natives/JavaLauncher.m

          JDK_BASE_PATH="${{ steps.setup-java.outputs.path }}"
          export PATH="$JDK_BASE_PATH/bin:/opt/homebrew/bin:$PATH"
          export JAVA_HOME="$JDK_BASE_PATH"
          export BOOTJDK="$JDK_BASE_PATH/bin"
          export SLIMMED=1
          
          export CODE_SIGNING_ALLOWED=NO
          export CODE_SIGNING_REQUIRED=NO
          export CODE_SIGN_IDENTITY=""

          export CFLAGS="-Wno-error=implicit-function-declaration $CFLAGS"
          export CXXFLAGS="-Wno-error=implicit-function-declaration $CXXFLAGS"

          SIGN_FLAGS="CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="

          # WARNING MITIGATION: Filter runtime stderr streams to suppress repetitive upstream vtool signature warnings
          gmake -j$(sysctl -n hw.ncpu) dsym package PLATFORM=2 $SIGN_FLAGS 2> >(grep -v "vtool warning: code signature will be invalid" >&2)
          
          gmake -j$(sysctl -n hw.ncpu) dsym package PLATFORM=2 TROLLSTORE_JIT_ENT=1 $SIGN_FLAGS 2> >(grep -v "vtool warning: code signature will be invalid" >&2)

          # POST-BUILD BINARY OPTIMIZATION: Purge invalid structural signature metadata and enforce clean ad-hoc signing via ldid
          if [ -d "artifacts" ]; then
            find artifacts -type f \( -name "*.ipa" -o -name "*.tipa" \) | while read -r app_package; do
              echo "Processing targeted application distribution bundle: $app_package"
              
              TMP_DIR=$(mktemp -d)
              unzip -q "$app_package" -d "$TMP_DIR"
              
              find "$TMP_DIR" -type f \( -perm +111 -o -name "*.dylib" -o -name "*.framework" \) | while read -r binary; do
                if file "$binary" | grep -q "Mach-O"; then
                  echo "Purging legacy structural signature data and generating ad-hoc schema: $binary"
                  codesign --remove-signature "$binary" 2>/dev/null || true
                  ldid -S "$binary" 2>/dev/null || codesign --force --sign - "$binary" 2>/dev/null
                fi
              done
              
              cd "$TMP_DIR"
              zip -qry "fixed.zip" .
              cd -
              mv "$TMP_DIR/fixed.zip" "$app_package"
              rm -rf "$TMP_DIR"
            done
            echo "/:: Post-build binary optimization successfully executed"
          else
            echo "Warning: Target distribution directory 'artifacts' absent. Bypassing validation phase."
          fi

      - name: List artifacts
        if: always()
        run: ls -la artifacts/ || true

      - name: Upload TrollStore tIPA
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: org.angelauramc.amethyst-ios-trollstore.tipa
          path: artifacts/*-trollstore.tipa
          retention-days: 30
          if-no-files-found: warn

      - name: Upload regular IPA
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: org.angelauramc.amethyst-ios.ipa
          path: artifacts/*.ipa
          retention-days: 30
          if-no-files-found: warn

      - name: Upload AngelAuraAmethyst.dSYM
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: AngelAuraAmethyst.dSYM
          path: artifacts/AngelAuraAmethyst.dSYM
          retention-days: 14
          if-no-files-found: warn

      # extract local compilation cmake diagnostic records upon unexpected pipeline failure
      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            Natives/build/CMakeFiles/CMakeOutput.log
            Natives/build/CMakeFiles/CMakeError.log
          if-no-files-found: ignore